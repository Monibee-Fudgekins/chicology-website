# Bundled into the Cloudflare Pages publish repo by .github/workflows/build_and_publish.yml
# so PRs (e.g. Copilot) get the same Next export signal as this monorepo.

name: Next export build

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: pages-build-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --progress=false

      - name: Build (Next export)
        run: npm run build

      - name: Verify Next export output directory
        shell: bash
        run: |
          if [ ! -d "out" ]; then
            echo "::error::Expected Next export output directory 'out' was not produced."
            exit 1
          fi

      - name: Fail if Pages Functions folder exists without routes
        shell: bash
        run: |
          if [ -d "functions" ]; then
            if ! find functions -type f \( -name "*.js" -o -name "*.ts" \) -maxdepth 2 | grep -q .; then
              echo "::error::'functions/' exists but has no route handlers; Cloudflare Pages will fail."
              exit 1
            fi
          fi
